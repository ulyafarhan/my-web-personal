openapi: 3.1.0
info:
  title: my-web-personal API
  version: 1.0.0
  description: API untuk interaksi frontend dengan layanan backend my-web-personal.

servers:
  - url: http://localhost:4321/api
    description: Development

paths:
  /chatbot:
    post:
      summary: Endpoint untuk ngobrol dengan chatbot AI (Sistem Pakar / Portofolio)
      tags: [Public]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pesan
                - riwayat
              properties:
                pesan:
                  type: string
                  example: "Halo, apa proyek terbarumu?"
                riwayat:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        example: "user"
                      content:
                        type: string
                        example: "Halo"
      responses:
        '200':
          description: Berhasil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatbotResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'

components:
  schemas:
    ChatbotResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            jawaban:
              type: string
              example: "Proyek terbaru saya adalah..."
        message:
          type: string
          example: "Berhasil"

  responses:
    ValidationError:
      description: Data input tidak valid
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Data tidak valid"
              errors:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
    ServerError:
      description: Terjadi kesalahan di server
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Internal Server Error"