<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- BACKGROUND 100% TRANSPARAN -->
  
  <!-- LOGO (Diskalakan dengan proporsi emas dan diposisikan di atas) -->
  <g transform="translate(80, 40) scale(0.6)" stroke="#0F172A" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Pilar M & U -->
    <path d="M 60 270 L 60 130 L 150 220 L 240 130 L 240 270" />
    <!-- Sayap F -->
    <path d="M 240 130 L 340 130" />
    <path d="M 240 200 L 310 200" />
  </g>

  <!-- TIPOGRAFI / TEXT -->
  <g text-anchor="middle" font-family="system-ui, -apple-system, 'Inter', 'Plus Jakarta Sans', sans-serif">
    
    <!-- NAMA UTAMA (Bold, Elegan, Berwibawa) -->
    <text x="200" y="260" font-size="22" font-weight="800" fill="#0F172A" letter-spacing="4">MUHAMMAD</text>
    <text x="200" y="292" font-size="22" font-weight="800" fill="#0F172A" letter-spacing="4">ULYA FARHAN</text>
    
    <!-- Garis Pemisah Presisi (Aksen Minimalis) -->
    <line x1="160" y1="320" x2="240" y2="320" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" />
    
    <!-- TITLE PROFESI -->
    <text x="200" y="352" font-size="11" font-weight="600" fill="#64748B" letter-spacing="6">SOFTWARE ENGINEER</text>
    
  </g>
</svg>